basePath: /
definitions:
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  expenses.CreateExpenseRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      splits:
        items:
          $ref: '#/definitions/expenses.SplitRequest'
        type: array
    type: object
  expenses.SplitRequest:
    properties:
      amount:
        type: number
      user_id:
        type: string
    type: object
  groups.AddMemberRequest:
    properties:
      user_id:
        type: string
    type: object
  groups.CreateGroupRequest:
    properties:
      name:
        type: string
    type: object
  models.Balance:
    properties:
      balance:
        type: number
      user_id:
        type: string
    type: object
  models.Expense:
    properties:
      amount:
        type: number
      created_at:
        type: string
      description:
        type: string
      group_id:
        type: string
      id:
        type: string
      paid_by:
        type: string
    type: object
  models.Group:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  models.Settlement:
    properties:
      amount:
        type: number
      created_at:
        type: string
      group_id:
        type: string
      id:
        type: string
      paid_by:
        type: string
      paid_to:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  settlements.CreateSettlementRequest:
    properties:
      amount:
        type: number
      paid_to:
        type: string
    type: object
  users.UpdateMeRequest:
    properties:
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A Splitwise-like expense splitting REST API.
  title: GoSplit API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid request body
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
      summary: Login and receive a JWT token
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: invalid request body
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      summary: Register a new user
      tags:
      - auth
  /api/groups:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Group'
            type: array
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all groups for the current user
      tags:
      - groups
    post:
      consumes:
      - application/json
      parameters:
      - description: Group name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/groups.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Group'
        "400":
          description: invalid request body
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a new group
      tags:
      - groups
  /api/groups/{id}:
    delete:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: invalid group ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a group
      tags:
      - groups
    get:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Group'
        "400":
          description: invalid group ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: group not found
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get a group by ID
      tags:
      - groups
    put:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: New group name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/groups.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Group'
        "400":
          description: invalid request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: group not found
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update a group name
      tags:
      - groups
  /api/groups/{id}/balances:
    get:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Balance'
            type: array
        "400":
          description: invalid group ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get net balances for all users in a group
      tags:
      - balances
  /api/groups/{id}/expenses:
    get:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Expense'
            type: array
        "400":
          description: invalid group ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all expenses in a group
      tags:
      - expenses
    post:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Expense data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/expenses.CreateExpenseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Expense'
        "400":
          description: invalid request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create an expense in a group
      tags:
      - expenses
  /api/groups/{id}/expenses/{expenseId}:
    delete:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Expense ID
        in: path
        name: expenseId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: invalid ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete an expense
      tags:
      - expenses
    get:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Expense ID
        in: path
        name: expenseId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Expense'
        "400":
          description: invalid ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: expense not found
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get a single expense
      tags:
      - expenses
    put:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Expense ID
        in: path
        name: expenseId
        required: true
        type: string
      - description: Updated expense data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/expenses.CreateExpenseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Expense'
        "400":
          description: invalid request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: expense not found
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update an expense
      tags:
      - expenses
  /api/groups/{id}/members:
    post:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: User to add
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/groups.AddMemberRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: invalid request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Add a member to a group
      tags:
      - groups
  /api/groups/{id}/members/{user_id}:
    delete:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: invalid ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Remove a member from a group
      tags:
      - groups
  /api/groups/{id}/settlements:
    get:
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Settlement'
            type: array
        "400":
          description: invalid group ID
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: List all settlements in a group
      tags:
      - settlements
    post:
      consumes:
      - application/json
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Settlement data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/settlements.CreateSettlementRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Settlement'
        "400":
          description: invalid request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Record a settlement between two users
      tags:
      - settlements
  /api/users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: user not found
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: Updated profile data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/users.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: invalid request
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: user not found
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
